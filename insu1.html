        .challenge-panel{background:#eaf0fb;border:1.5px solid #aed6f1;color:#1a5276;padding:10px 20px;border-radius:8px;display:flex;justify-content:space-around;align-items:center;max-width:900px;margin:0 auto 10px;}

        @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
        .word-bank-container.shake{animation:shake 0.4s ease;}
        .container{max-width:900px;margin:20px auto;background:white;padding:24px;border-radius:12px;}
        .sec-title{font-weight:900;font-size:1.1em;color:#2980b9;border-left:6px solid #2980b9;padding-left:10px;margin-bottom:14px;margin-top:24px;}

        .point-box.red{background:#fdedec;border-color:#e74c3c;}
        .point-box.red h4{color:#e74c3c;font-size:12px;font-weight:900;margin:0 0 5px;}
        .exp-box{background:#f4f6f8;border-radius:9px;padding:12px 16px;margin-bottom:10px;border-left:4px solid #27ae60;font-size:14px;line-height:2;display:none;}

        .exp-box.orange{border-left-color:#e67e22;} .exp-box.orange h4{color:#e67e22;}
        .exp-box h4{font-size:12px;color:#27ae60;font-weight:900;margin-bottom:5px;}
        @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        .reveal-btn{background:#2980b9;color:white;border:none;border-radius:8px;padding:10px 22px;font-size:14px;font-weight:bold;cursor:pointer;margin-top:8px;font-family:sans-serif;}
        .reveal-btn:hover{background:#1a5276;}
        .reidai-box{background:#fafcff;border:2px solid #aed6f1;border-radius:10px;padding:20px 24px;margin-bottom:24px;}
        .ruidai-box{background:#fffdf5;border:2px solid #f9e4b0;border-radius:10px;padding:20px 24px;margin-bottom:20px;}
        .ruidai-title{font-weight:900;font-size:1em;color:#e67e22;margin-bottom:14px;border-left:6px solid #e67e22;padding-left:10px;}
        .test-box{background:#fdf2f8;border:2px solid #d7bde2;border-radius:10px;padding:20px 24px;margin-bottom:20px;}
        .test-title{font-weight:900;font-size:1em;color:#8e44ad;margin-bottom:14px;border-left:6px solid #8e44ad;padding-left:10px;}
        .q-text{font-size:14.5px;line-height:1.9;margin-bottom:14px;background:#f0f6ff;border-radius:6px;padding:10px 14px;}

        .step-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
        .step-label{color:#888;min-width:70px;font-size:13px;flex-shrink:0;}
        .phase-bar{background:#eaf0fb;border-left:4px solid #2980b9;padding:4px 10px;border-radius:0 4px 4px 0;font-size:12px;font-weight:bold;color:#2980b9;margin:8px 0 6px;}
        .math{font-style:italic;color:#1a5276;font-weight:bold;}
        .math-r{font-style:italic;color:#c0392b;font-weight:bold;}
        .drop-zone-inline{display:inline-flex;align-items:center;justify-content:center;min-width:60px;min-height:2em;background:var(--drop-zone-bg);border:1.5px solid #aaa;vertical-align:middle;cursor:pointer;text-align:center;font-weight:bold;color:#c0392b;padding:2px 8px;border-radius:3px;font-size:14px;transition:background .15s;}
        .drop-zone-inline:hover{border-color:#e67e22;background:#fff3cd;}
        .drop-zone-inline.correct{background:#d4edda!important;border:2px solid #28a745!important;color:#155724!important;}
        .drop-zone-inline.wrong{background:#f8d7da!important;border:2px solid #dc3545!important;}

        .score-panel.fail .score-big{color:#e74c3c;}
        .controls{text-align:center;margin-top:30px;padding-bottom:100px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}

        .btn-start{background:#27ae60;} .btn-check{background:#e67e22;} .btn-show{background:#7f8c8d;}
        #confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;}

<body>
<canvas id="confetti-canvas"></canvas>
<div class="sticky-header">
    <nav class="page-nav" id="topnav"></nav>
    <div class="lv-banner" id="lvbanner"></div>
    <div class="challenge-panel">
        <div>TIME: <span id="timerDisplay" class="timer">00:00.0</span></div>
        <div id="recordDisplay" style="font-size:0.8em;">記録なし</div>
    </div>
    <div class="word-bank-container">
        <div id="wordBank" class="word-bank">「チャレンジ開始」をクリックしてください。</div>
    </div>
</div>
<div class="container" id="main-content"></div>
<div class="controls">
    <button class="main-btn btn-start" onclick="stCh()">▶ チャレンジ開始</button>
    <button class="main-btn btn-check" onclick="chAn()">✔ 答え合わせ</button>
    <button class="main-btn btn-show"  onclick="shMo()">👁 お手本を見る</button>
</div>
<div style="position:fixed;bottom:110px;left:16px;z-index:3000;">
    <button id="reviewBtn" onclick="toggleReview()" style="background:#f39c12;color:white;border:none;border-radius:24px;padding:10px 18px;font-size:13px;font-weight:bold;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,0.2);display:flex;align-items:center;gap:6px;">
        <span id="reviewIcon">☆</span><span id="reviewText">復習リストに追加</span>
    </button>
</div>
<script>
var UNIT_KEY='insu1';
var isRunning=false,sW=null,sT,tI,bestTime=null;
function setZone(z,val){z.innerHTML=val;z.setAttribute('data-filled',val);}
function getZoneVal(z){return z.getAttribute('data-filled')||z.innerText.trim();}
function clearZoneEl(z){z.innerHTML='';z.removeAttribute('data-filled');z.classList.remove('correct','wrong');}
function addToBank(word){var b=document.getElementById('wordBank'),d=document.createElement('div');d.className='drag-item';d.setAttribute('data-val',word);d.innerText=word;d.onclick=function(){if(sW)sW.classList.remove('selected');if(sW===this){sW=null;return;}sW=this;this.classList.add('selected');};b.appendChild(d);}
function zCl(z){if(!isRunning)return;var cur=getZoneVal(z);if(cur!==''){addToBank(cur);clearZoneEl(z);return;}if(sW){var val=sW.getAttribute('data-val')||sW.innerText;setZone(z,val);sW.remove();sW=null;}}
function fmtTime(ms){var t=ms/1000;return Math.floor(t/60).toString().padStart(2,'0')+':'+((t%60).toFixed(1)).padStart(4,'0');}
function stCh(){isRunning=true;sW=null;sT=Date.now();clearInterval(tI);tI=setInterval(function(){document.getElementById('timerDisplay').innerText=fmtTime(Date.now()-sT);},100);var zones=document.querySelectorAll('.drop-zone-inline'),allAns=[];zones.forEach(function(z){allAns.push(z.getAttribute('data-ans'));clearZoneEl(z);});var b=document.getElementById('wordBank');b.innerHTML='';allAns.sort(function(){return Math.random()-0.5;});allAns.forEach(function(w){addToBank(w);});document.getElementById('score-panel').style.display='none';}
function chAn(){if(!isRunning)return;var ok=true,correct=0,total=0;document.querySelectorAll('.drop-zone-inline').forEach(function(z){var ans=z.getAttribute('data-ans'),cur=getZoneVal(z);total++;if(cur===ans){z.classList.add('correct');z.classList.remove('wrong');correct++;}else{z.classList.add('wrong');z.classList.remove('correct');ok=false;if(cur!==''){addToBank(cur);clearZoneEl(z);}}});if(ok){clearInterval(tI);isRunning=false;var el=Date.now()-sT;if(bestTime===null||el<bestTime){bestTime=el;document.getElementById('recordDisplay').innerText='🏆 ベスト: '+fmtTime(bestTime);}startCnf();showScore(correct,total);}else{var wbc=document.querySelector('.word-bank-container');wbc.classList.remove('shake');void wbc.offsetWidth;wbc.classList.add('shake');setTimeout(function(){wbc.classList.remove('shake');},500);}}
function shMo(){clearInterval(tI);isRunning=false;sW=null;document.querySelectorAll('.drop-zone-inline').forEach(function(z){setZone(z,z.getAttribute('data-ans'));z.classList.remove('correct','wrong');});document.getElementById('wordBank').innerHTML='<span style="color:#888;font-size:0.9em;">お手本表示中。「チャレンジ開始」で練習できます。</span>';document.getElementById('timerDisplay').innerText='00:00.0';}
function showScore(c,t){var pass=c>=5,panel=document.getElementById('score-panel');panel.className='score-panel'+(pass?'':' fail');panel.style.display='block';document.getElementById('score-text').innerText=c+' / '+t+' 問正解';document.getElementById('score-msg').innerText=pass?'🎉 合格！すばらしい！':'もう少し！復習してもう一度挑戦しよう。';}
var stepRevState={e1:0};
function revealStep(qid,total){var r=stepRevState[qid],el=document.getElementById(qid+'-s'+r);if(el){el.style.display='block';stepRevState[qid]++;setTimeout(function(){el.scrollIntoView({behavior:'smooth',block:'nearest'});},60);}var btn=document.getElementById('rb-'+qid);if(stepRevState[qid]>=total){btn.style.display='none';}else{btn.innerText='▶ STEP '+(stepRevState[qid]+1)+' を見る';}}
var cvs=document.getElementById("confetti-canvas"),ctx2=cvs.getContext("2d"),pts=[],cnfRunning=false;
function startCnf(){cvs.width=window.innerWidth;cvs.height=window.innerHeight;pts=[];for(var i=0;i<180;i++)pts.push({x:Math.random()*cvs.width,y:Math.random()*cvs.height-cvs.height,s:Math.random()*9+4,c:'hsl('+Math.floor(Math.random()*360)+',75%,65%)',sp:Math.random()*3+2});cnfRunning=true;updateCnf();setTimeout(function(){cnfRunning=false;ctx2.clearRect(0,0,cvs.width,cvs.height);pts=[];},4000);}
function updateCnf(){if(!cnfRunning)return;ctx2.clearRect(0,0,cvs.width,cvs.height);pts.forEach(function(p){p.y+=p.sp;ctx2.fillStyle=p.c;ctx2.fillRect(p.x,p.y,p.s,p.s);if(p.y>cvs.height)p.y=-20;});requestAnimationFrame(updateCnf);}
(function(){try{var d=JSON.parse(localStorage.getItem('study_'+UNIT_KEY)||'{"count":0,"review":false}');d.count=(d.count||0)+1;d.lastDate=new Date().toLocaleDateString('ja-JP');localStorage.setItem('study_'+UNIT_KEY,JSON.stringify(d));}catch(e){}})();
function toggleReview(){try{var d=JSON.parse(localStorage.getItem('study_'+UNIT_KEY)||'{"count":0,"review":false}');d.review=!d.review;localStorage.setItem('study_'+UNIT_KEY,JSON.stringify(d));updateReviewBtn(d.review);}catch(e){}}
function updateReviewBtn(r){document.getElementById('reviewIcon').innerText=r?'★':'☆';document.getElementById('reviewText').innerText=r?'復習リストに追加済み':'復習リストに追加';document.getElementById('reviewBtn').style.background=r?'#e74c3c':'#f39c12';}
(function(){try{var d=JSON.parse(localStorage.getItem('study_'+UNIT_KEY)||'{"count":0,"review":false}');updateReviewBtn(d.review||false);}catch(e){}})();
</script>

html+='<div class="sec-title">🏆 テスト（チャレンジ）</div><div class="test-box"><div class="test-title">テスト — 6問に挑戦！（5問以上で合格）</div>'+P.testHTML()+'</div>';

mc.innerHTML=html;

// 類題
var qi=0,qscore=0;
function buildQuiz(){
    var area=document.getElementById('quiz-area');area.innerHTML='';
    if(qi>=P.quizData.length){area.innerHTML='<div class="score-panel" style="display:block;"><div class="score-big">'+qscore+'/'+P.quizData.length+'</div><button onclick="qi=0;qscore=0;buildQuiz();" style="margin-top:10px;background:#1a5276;color:white;border:none;padding:8px 20px;border-radius:8px;font-weight:bold;cursor:pointer;">もう一度</button></div>';return;}
    var d=P.quizData[qi],h='<div class="ruidai-box"><div class="ruidai-title">類題 '+(qi+1)+'/'+P.quizData.length+'</div><div class="q-text">'+d.q+'</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;">';
    ['①','②','③','④'].forEach(function(l,i){h+='<button onclick="ansQuiz('+i+')" id="qc'+i+'" style="padding:10px 8px;border:2px solid #ddd;border-radius:8px;background:white;font-size:14px;cursor:pointer;font-family:sans-serif;font-weight:bold;">'+l+'　'+d.choices[i]+'</button>';});
    h+='</div><div id="qfb" style="display:none;border-radius:8px;padding:10px 14px;font-size:13px;"></div></div>';
    area.innerHTML=h;
}
function ansQuiz(i){
    var d=P.quizData[qi],fb=document.getElementById('qfb');
    for(var j=0;j<4;j++){var b=document.getElementById('qc'+j);if(!b)continue;b.disabled=true;if(j===d.ans)b.style.background='#d4edda';else if(j===i&&i!==d.ans)b.style.background='#f8d7da';}
    if(i===d.ans){fb.style.display='block';fb.style.background='#eafaf1';fb.style.border='1.5px solid #27ae60';fb.innerHTML='<strong style="color:#27ae60">✓ 正解！</strong><br><span style="font-size:12px;color:#555;">'+d.sol+'</span>';qscore++;}
    else{fb.style.display='block';fb.style.background='#fdedec';fb.style.border='1.5px solid #e74c3c';fb.innerHTML='<strong style="color:#e74c3c">✗ 不正解</strong>　正解：'+['①','②','③','④'][d.ans]+'<br><span style="font-size:12px;color:#555;">'+d.sol+'</span>';}
    fb.innerHTML+='<br><button onclick="qi++;buildQuiz();" style="margin-top:8px;background:#1a5276;color:white;border:none;padding:7px 18px;border-radius:8px;font-weight:bold;cursor:pointer;">次の問題 →</button>';
}
buildQuiz();
shMo();
</script>
</body>
</html>
