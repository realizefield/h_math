<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>2-4 テスト</title>
    <style>
        /* スタイルは2-3と共通 */
        :root { --bg-color: #f8fbff; --main-blue: #2c5d91; --ans-color: #d32f2f; --ans-bg: #fff9c4; --success-green: #2e7d32; --container-width: 1000px; }
        body { background-color: var(--bg-color); font-family: "Hiragino Sans", "Meiryo", sans-serif; margin: 0; padding: 0; line-height: 2.2; padding-bottom: 250px; }
        .wrapper { max-width: var(--container-width); margin: 0 auto; }
        .timer-header { background: #333; color: white; padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .timer-main { font-size: 26px; color: #ffeb3b; font-family: monospace; font-weight: bold; }
        .nav-tabs { background: white; padding: 15px 20px; border-bottom: 2px solid #ddd; display: flex; gap: 10px; box-sizing: border-box; }
        .tab { padding: 12px 10px; border: 1px solid #ccc; border-radius: 5px; background: #f5f5f5; cursor: pointer; color: #333; font-size: 14px; font-weight: bold; flex: 1; text-align: center; text-decoration: none; display: block; }
        .tab.active { background: var(--main-blue); color: white; border-color: var(--main-blue); }
        .container { padding: 30px 0; }
        .content-card { background: white; padding: 50px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); position: relative; box-sizing: border-box; }
        .math-block { background: #fdfdfd; border: 1px solid #eee; padding: 25px; border-radius: 8px; margin: 15px 0; font-family: "Times New Roman", serif; font-size: 1.3em; position: relative; }
        .blank { display: inline-block; min-width: 80px; border-bottom: 2px solid #999; text-align: center; margin: 0 4px; padding: 0 5px; min-height: 1.5em; vertical-align: bottom; }
        .blank.challenge { background-color: #fffde7; color: #333; border-bottom: 2px solid var(--main-blue); cursor: pointer; }
        .blank.correct { color: var(--success-green); border-bottom: 3px solid var(--success-green); }
        .hint-btn { background: #fffde7; border: 1px solid #fbc02d; border-radius: 4px; padding: 2px 10px; cursor: pointer; font-size: 14px; color: #555; position: absolute; right: 20px; top: 20px; }
        .popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border: 3px solid #e74c3c; padding: 20px; border-radius: 12px; z-index: 3000; display: none; box-shadow: 0 10px 40px rgba(0,0,0,0.3); text-align: center; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2500; display: none; }
        #word-bank-container { position: fixed; bottom: 0; left: 0; width: 100%; background: #eee; border-top: 4px solid var(--main-blue); padding: 20px 0; z-index: 2000; display: none; }
        #word-bank { max-width: var(--container-width); margin: 0 auto; display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
        .word-item { background: white; border: 2px solid var(--main-blue); padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 18px; }
        .word-item.used { visibility: hidden; pointer-events: none; }
        .bottom-controls { text-align: center; margin-top: 40px; }
        .btn-action { padding: 18px 50px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; color: white; font-size: 18px; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="timer-header"><div class="timer-main">TIME: <span id="timer">00:00.0</span></div></div>
    <div class="nav-tabs">
        <a href="ma_1_01_02_1.html" class="tab">2-1 対称式導入</a>
        <a href="ma_1_01_02_2.html" class="tab">2-2 例題</a>
        <a href="ma_1_01_02_3.html" class="tab">2-3 類題</a>
        <a href="ma_1_01_02_4.html" class="tab active">2-4 テスト</a>
    </div>
    <div class="container">
        <div class="content-card">
            <h2>対称式【実戦テスト】</h2>
            <p>χ＋ｙ＝3， χｙ＝1 のとき、次の式の値を求めよ。<br><small>＜国立病院機構横浜医療センター附属看護学校 入試問題＞</small></p>
            <div class="math-block">
                (1) χ²＋ｙ² ＝ [ <span class="blank" data-ans="7"></span> ]<br>
                (2) χ³＋ｙ³ ＝ [ <span class="blank" data-ans="18"></span> ]
                <button class="hint-btn" onclick="showHint('HT')">公式の確認</button>
            </div>
            <div class="bottom-controls">
                <button class="btn-action" style="background: #e74c3c;" onclick="startChallenge()">テスト開始</button>
                <button class="btn-action" style="background: #4caf50;" onclick="checkAnswers()">判定</button>
            </div>
        </div>
    </div>
</div>
<div id="overlay" class="overlay" onclick="closePopups()"></div>
<div id="HT" class="popup">
    <div style="font-weight:bold; margin-bottom:10px;">この式を使います。</div>
    <img src="image_62ad3f.png" style="width:200px;"><br>
    <img src="image_62b0de.png" style="width:280px; margin-top:10px;">
    <button style="display:block; margin: 15px auto 0;" onclick="closePopups()">閉じる</button>
</div>
<div id="AnsPopup" class="popup" style="width: 500px; text-align: left; border-color: var(--success-green);">
    <div style="text-align:center; font-weight:bold; font-size:1.2em;">【テスト解説】</div>
    <p><b>(1)</b> 3² － 2(1) ＝ 9 － 2 ＝ <b>7</b></p>
    <p><b>(2)</b> 3³ － 3(1)(3) ＝ 27 － 9 ＝ <b>18</b></p>
    <button style="display:block; margin: 15px auto 0;" onclick="closePopups()">閉じる</button>
</div>
<div id="word-bank-container"><div id="word-bank"></div></div>
<script>
    let startTime, timerInterval, selectedWord = null;
    const allWords = ["7", "18", "9", "21", "5", "15"];
    function showHint(id){ document.getElementById('overlay').style.display='block'; document.getElementById(id).style.display='block'; }
    function closePopups(){ document.getElementById('overlay').style.display='none'; document.querySelectorAll('.popup').forEach(p=>p.style.display='none'); }
    function startChallenge() {
        const blanks = document.querySelectorAll('.blank'); const bank = document.getElementById('word-bank');
        document.getElementById('word-bank-container').style.display = 'block'; bank.innerHTML = '';
        blanks.forEach(b => { b.classList.add('challenge'); b.innerText = ''; b.onclick = function() { if(this.innerText!==''){ document.getElementById(this.getAttribute('data-used-id')).classList.remove('used'); this.innerText=''; } if(selectedWord){ this.innerText=selectedWord.innerText; this.setAttribute('data-used-id',selectedWord.id); selectedWord.classList.add('used'); selectedWord=null; } }; });
        [...allWords].sort(()=>Math.random()-0.5).forEach((w,i)=>{ const d=document.createElement('div'); d.className='word-item'; d.id='word-'+i; d.innerText=w; d.onclick=function(){ document.querySelectorAll('.word-item').forEach(it=>it.style.background='white'); this.style.background='#e3f2fd'; selectedWord=this; }; bank.appendChild(d); });
        startTime=Date.now(); timerInterval=setInterval(()=>{ document.getElementById('timer').innerText=((Date.now()-startTime)/1000).toFixed(1).padStart(6,'0'); },100);
    }
    function checkAnswers() { let ok=true; document.querySelectorAll('.blank').forEach(b=>{ if(b.innerText===b.getAttribute('data-ans')){ b.classList.add('correct'); } else { ok=false; } }); document.getElementById('overlay').style.display='block'; document.getElementById('AnsPopup').style.display='block'; if(ok){ clearInterval(timerInterval); } }
</script>
</body>
</html>
